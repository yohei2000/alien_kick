<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#07131f" />
    <meta name="description" content="エイリアンキックバスター: リズムよくボレーシュートを決めるスマホ向けWebゲーム" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="エイリアンキックバスター" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>エイリアンキックバスター</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./assets/icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="game-shell" aria-label="エイリアンキックバスター">
      <div id="game" aria-label="ゲーム画面"></div>
      <section class="hud" aria-live="polite">
        <div class="hud__top">
          <div>
            <span class="hud__label">SCORE</span>
            <strong id="score">0</strong>
          </div>
          <div>
            <span class="hud__label">TIME</span>
            <strong id="time">90</strong>
          </div>
          <div>
            <span class="hud__label">COMBO</span>
            <strong id="combo">0</strong>
          </div>
        </div>
        <div class="hud__boss">
          <div class="hud__boss-copy">
            <span class="hud__boss-identity">
              <span id="alienName">スライムGK ネブラ</span>
              <span id="alienTag">粘液ボディ: 低速だが伸びる</span>
            </span>
            <span id="alienState">READY</span>
          </div>
          <div class="hp-track"><span id="hpBar"></span></div>
        </div>
      </section>
      <section id="message" class="message">
        <p class="message__eyebrow">ALIEN KICK BUSTER</p>
        <h1><span class="title-line">エイリアン</span><span class="title-line">キックバスター</span></h1>
        <p>ボールが来るリズムに重なった瞬間にタップ。ハードヒットでコンボをつなぎ、エイリアンGKを吹き飛ばせ。</p>
        <button id="startButton" type="button">KICK OFF</button>
      </section>
      <button id="pauseButton" class="pause" type="button" aria-label="一時停止">II</button>
      <div id="feedback" class="feedback" aria-hidden="true"></div>
    </main>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch(() => {});
        });
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
    <script type="module" src="./src/game.js?v=characters-1"></script>
  </body>
</html>
